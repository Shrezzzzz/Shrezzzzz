<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="40%"  stop-color="#1e3a8a"/>
      <stop offset="75%"  stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3730a3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e3a8a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)"/>

  <!-- Wave layer 1 (back) -->
  <path d="M0,140 C150,100 300,170 450,140 C600,110 750,160 900,135 C1050,110 1150,145 1200,130 L1200,200 L0,200 Z"
        fill="url(#wave2)"/>

  <!-- Wave layer 2 (front) -->
  <path d="M0,160 C200,130 350,175 550,155 C750,135 900,168 1100,150 C1150,147 1180,152 1200,150 L1200,200 L0,200 Z"
        fill="url(#wave1)"/>

  <!-- Dot grid accent (top-right) -->
  <g fill="#a78bfa" fill-opacity="0.15">
    <circle cx="980" cy="25"  r="2"/><circle cx="1000" cy="25"  r="2"/><circle cx="1020" cy="25"  r="2"/><circle cx="1040" cy="25"  r="2"/><circle cx="1060" cy="25"  r="2"/>
    <circle cx="980" cy="45"  r="2"/><circle cx="1000" cy="45"  r="2"/><circle cx="1020" cy="45"  r="2"/><circle cx="1040" cy="45"  r="2"/><circle cx="1060" cy="45"  r="2"/>
    <circle cx="980" cy="65"  r="2"/><circle cx="1000" cy="65"  r="2"/><circle cx="1020" cy="65"  r="2"/><circle cx="1040" cy="65"  r="2"/><circle cx="1060" cy="65"  r="2"/>
    <circle cx="980" cy="85"  r="2"/><circle cx="1000" cy="85"  r="2"/><circle cx="1020" cy="85"  r="2"/><circle cx="1040" cy="85"  r="2"/><circle cx="1060" cy="85"  r="2"/>
  </g>

  <!-- Dot grid accent (top-left) -->
  <g fill="#93c5fd" fill-opacity="0.12">
    <circle cx="140" cy="25"  r="2"/><circle cx="160" cy="25"  r="2"/><circle cx="180" cy="25"  r="2"/><circle cx="200" cy="25"  r="2"/>
    <circle cx="140" cy="45"  r="2"/><circle cx="160" cy="45"  r="2"/><circle cx="180" cy="45"  r="2"/><circle cx="200" cy="45"  r="2"/>
    <circle cx="140" cy="65"  r="2"/><circle cx="160" cy="65"  r="2"/><circle cx="180" cy="65"  r="2"/><circle cx="200" cy="65"  r="2"/>
  </g>

  <!-- Name -->
  <text x="600" y="90"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="42"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="1">Hey, it&#39;s me &#8212; Shreya Chowdhury! &#128075;</text>

  <!-- Tagline -->
  <text x="600" y="128"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="15"
        font-weight="400"
        fill="#c4b5fd"
        text-anchor="middle"
        letter-spacing="0.5">CSE Student &#183; Cybersecurity &#183; IoT &#183; Blockchain &#183; Full-Stack Dev &#183; Cloud &#38; AI</text>
</svg>
